<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Aritmética Modular</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="title">
            <p>Calculadora Modular</p>
        </div>

        <div class="interface card">
            <input type="number" id="modn" placeholder="Módulo" class="input">
            <input type="number" id="numA" placeholder="Primeiro número" class="input">
            
            <select name="operacoes" id="operacoes" class="selectOp">
                <option value="" disabled selected>Escolha uma operação</option>
                <option value="add">Adição (+)</option>
                <option value="multi">Multiplicação (*)</option>
                <option value="expo">Exponenciação (aᵇ)</option>
            </select>
            
            <input type="number" id="numB" placeholder="Segundo número" class="input">
        </div>

        <div class="canvas-container">
            <div class="circuloMod card">   
                <canvas width="500" height="500" id="relogio"></canvas>
            </div>
            
            <div class="grafico card">   
                <canvas width="500" height="500" id="grafico"></canvas>
            </div>
        </div>
    </div>

    <script src="circulomod.js"></script>
</body>
</html>
